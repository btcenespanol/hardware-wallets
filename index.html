    specs: ["Secure Element dedicado", "Open source", "Bitcoin + Liquid", "Pantalla mejorada", "USB-C"],
    buyUrl: "https://store.blockstream.com/product/blockstream-jade-plus/"
  },
  {
    name: "Portal",
    maker: "TwentyTwo (Foundation)",
    year: 2024,
    price: 89,
    currency: "€",
    type: "btc",
    typeLabel: "Solo BTC",
    description: "Hardware wallet ultra-fina (tarjeta) con NFC. Solo Bitcoin, sin batería, alimentada por el móvil. Open source.",
    specs: ["Form factor tarjeta", "NFC", "Solo Bitcoin", "Sin batería", "Open source"],
    buyUrl: "https://twenty-two.xyz/"
  }
];

// Chart bounds
const X_MIN = 2019, X_MAX = 2026;
const Y_MIN = 0, Y_MAX = 420;
const PADDING = { top: 20, right: 40, bottom: 50, left: 60 };

function drawGrid() {
  const svg = document.getElementById('gridSvg');
  const area = document.getElementById('chartArea');
  const w = area.clientWidth;
  const h = area.clientHeight;
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.innerHTML = '';

  // Y-axis grid lines and labels
  const yTicks = [0, 100, 200, 300, 400];
  yTicks.forEach(yVal => {
    const y = mapY(yVal, h);
    svg.innerHTML += `<line class="grid-line" x1="${PADDING.left}" y1="${y}" x2="${w - PADDING.right}" y2="${y}"/>`;
    svg.innerHTML += `<text class="axis-label" x="${PADDING.left - 10}" y="${y + 4}" text-anchor="end">${yVal}</text>`;
  });

  // X-axis grid lines and labels
  for (let yr = X_MIN; yr <= X_MAX; yr++) {
    const x = mapX(yr, w);
    svg.innerHTML += `<line class="grid-line" x1="${x}" y1="${PADDING.top}" x2="${x}" y2="${h - PADDING.bottom}"/>`;
    svg.innerHTML += `<text class="axis-label" x="${x}" y="${h - PADDING.bottom + 20}" text-anchor="middle">${yr}</text>`;
  }

  // Axis titles
  svg.innerHTML += `<text class="axis-title" x="${PADDING.left - 45}" y="${PADDING.top + 4}">Precio</text>`;
  svg.innerHTML += `<text class="axis-label" x="${PADDING.left - 45}" y="${PADDING.top + 20}">€/USD</text>`;
  svg.innerHTML += `<text class="axis-title" x="${w - PADDING.right + 8}" y="${h - PADDING.bottom + 4}">Año</text>`;
}

function mapX(year, w) {
  const range = w - PADDING.left - PADDING.right;
  return PADDING.left + ((year - X_MIN) / (X_MAX - X_MIN)) * range;
}
function mapY(price, h) {
  const range = h - PADDING.top - PADDING.bottom;
  return (h - PADDING.bottom) - (price / Y_MAX) * range;
}

// Jitter to avoid overlapping dots at same year/price
function jitterX(year, allWallets) {
  const sameYear = allWallets.filter(w => w.year === year);
  const idx = sameYear.findIndex(w => w === allWallets.find(x => x.year === year));
  return year;
}

function plotWallets() {
  const plot = document.getElementById('plotArea');
  const area = document.getElementById('chartArea');
  const w = area.clientWidth;
  const h = area.clientHeight;
  plot.style.left = '0';
  plot.style.top = '0';
  plot.style.width = w + 'px';
  plot.style.height = h + 'px';
  plot.innerHTML = '';

  // Group by year for jittering
  const byYear = {};
  wallets.forEach(wt => {
    if (!byYear[wt.year]) byYear[wt.year] = [];
    byYear[wt.year].push(wt);
  });

  wallets.forEach((wt, i) => {
    // Jitter horizontally if multiple in same year
    const yearGroup = byYear[wt.year];
    const idxInYear = yearGroup.indexOf(wt);
    const jitterAmount = (yearGroup.length > 1) ? (idxInYear - (yearGroup.length - 1) / 2) * 0.18 : 0;
    const xVal = wt.year + jitterAmount;

    const x = mapX(xVal, w);
    const y = mapY(wt.price, h);

    // Dot
    const dot = document.createElement('button');
    dot.className = `wallet-dot ${wt.type}`;
    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    dot.dataset.idx = i;
    dot.setAttribute('aria-label', `${wt.name} - ${wt.price} ${wt.currency} - ${wt.year}`);
    plot.appendChild(dot);

    // Label — alternate placement above/below for readability
    const labelOffset = (idxInYear % 2 === 0) ? -32 : 28;
    const label = document.createElement('div');
    label.className = 'wallet-label';
    label.style.left = x + 'px';
    label.style.top = (y + labelOffset) + 'px';
    label.dataset.idx = i;
    label.innerHTML = `<span class="name">${wt.name}</span><span class="price">${wt.price} ${wt.currency}</span>`;
    plot.appendChild(label);
  });

  // Click handlers
  document.querySelectorAll('.wallet-dot').forEach(dot => {
    dot.addEventListener('click', (e) => {
      const idx = parseInt(e.currentTarget.dataset.idx);
      openDetail(wallets[idx]);
    });
  });
}

// Detail modal
function openDetail(wt) {
  const overlay = document.getElementById('detailOverlay');
  const content = document.getElementById('detailContent');

  let typeColor = wt.type === 'btc' ? 'var(--btc)' : wt.type === 'web3' ? 'var(--web3)' : 'gold';
  const dotClass = wt.type;

  content.innerHTML = `
    <div class="type-badge"><span class="dot ${dotClass}" style="width:8px;height:8px;border-radius:50%;display:inline-block;"></span>${wt.typeLabel}</div>
    <h2>${wt.name}</h2>
    <div class="maker">${wt.maker}</div>
    <div class="stats-grid">
      <div class="stat">
        <div class="label">Precio</div>
        <div class="value price">${wt.price} ${wt.currency}</div>
      </div>
      <div class="stat">
        <div class="label">Año</div>
        <div class="value">${wt.year}</div>
      </div>
    </div>
    <div class="description">${wt.description}</div>
    <div class="specs-list">
      <h3>Características</h3>
      <ul>${wt.specs.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>
    <a href="${wt.buyUrl}" target="_blank" rel="noopener" class="buy-btn">Ver en sitio oficial →</a>
  `;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('closeBtn').addEventListener('click', closeDetail);
document.getElementById('detailOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'detailOverlay') closeDetail();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.currentTarget.classList.add('active');
    const filter = e.currentTarget.dataset.filter;

    document.querySelectorAll('.wallet-dot').forEach(dot => {
      const idx = parseInt(dot.dataset.idx);
      const wt = wallets[idx];
      if (filter === 'all' || wt.type === filter) {
        dot.classList.remove('dimmed');
      } else {
        dot.classList.add('dimmed');
      }
    });
    document.querySelectorAll('.wallet-label').forEach(lbl => {
      const idx = parseInt(lbl.dataset.idx);
      const wt = wallets[idx];
      if (filter === 'all' || wt.type === filter) {
        lbl.classList.remove('dimmed');
      } else {
        lbl.classList.add('dimmed');
      }
    });
  });
});

// Render
function render() {
  drawGrid();
  plotWallets();
}
render();
window.addEventListener('resize', render);
</script>
</body>
</html>
